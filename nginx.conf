server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for any path that isn't a real file,
    # so React Router can handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached so new deployments take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Vite fingerprints all JS/CSS/asset filenames with a content hash,
    # so they can be cached forever safely.
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"                 always;

    # Gzip — reduces JS bundle transfer size significantly.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
