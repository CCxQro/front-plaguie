# Cloud Build pipeline for the Plaguie frontend (React + Vite).
#
# Steps:
#   1. install  — npm ci (skips browser binaries for Cypress/Playwright)
#   2. lint     — ESLint check, fails the build on errors
#   3. build    — Vite production build; VITE_* secrets injected from Secret Manager
#   4. docker   — Build nginx:alpine image from pre-built dist/, push to Artifact Registry
#   5. deploy   — Deploy the versioned image to Cloud Run
#
# Trigger this pipeline by:
#   - Pushing a Git tag (version = tag name, e.g. v1.2.0)
#   - Any push/PR (version = SHORT_SHA, used for staging/preview)

substitutions:
  _REGION:     us-central1
  _REPOSITORY: front-plaguie
  _IMAGE:      front-plaguie-web
  _SERVICE:    front-plaguie-web
  _PROJECT_ID: plaguie-494022
  # Backend URL baked into the bundle at build time.
  # Override per-trigger in the Cloud Build console if you have separate
  # staging and production backends.
  _API_URL:    https://back-plaguie-api-<hash>-uc.a.run.app

options:
  logging:     CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

# Pull VITE_* secrets from Secret Manager and expose them as env vars
# during the build step so Vite can bake them into the bundle.
availableSecrets:
  secretManager:
    - versionName: projects/${_PROJECT_ID}/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: VITE_FIREBASE_API_KEY
    - versionName: projects/${_PROJECT_ID}/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest
      env: VITE_FIREBASE_AUTH_DOMAIN
    - versionName: projects/${_PROJECT_ID}/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest
      env: VITE_FIREBASE_PROJECT_ID
    - versionName: projects/${_PROJECT_ID}/secrets/VITE_FIREBASE_STORAGE_BUCKET/versions/latest
      env: VITE_FIREBASE_STORAGE_BUCKET
    - versionName: projects/${_PROJECT_ID}/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: VITE_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/${_PROJECT_ID}/secrets/VITE_FIREBASE_APP_ID/versions/latest
      env: VITE_FIREBASE_APP_ID
    - versionName: projects/${_PROJECT_ID}/secrets/VITE_GOOGLE_WEATHER_API_KEY/versions/latest
      env: VITE_GOOGLE_WEATHER_API_KEY

steps:
  # ── 1. Install dependencies ──────────────────────────────────────────────────
  - id: install
    name: node:22-alpine
    entrypoint: npm
    args: ['ci']
    env:
      # Skip heavy browser binary downloads — not needed for a production build
      - 'CYPRESS_INSTALL_BINARY=0'
      - 'PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1'

  # ── 2. Lint ──────────────────────────────────────────────────────────────────
  - id: lint
    name: node:22-alpine
    entrypoint: npm
    args: ['run', 'lint']
    waitFor: ['install']

  # ── 3. Vite production build ─────────────────────────────────────────────────
  # VITE_* secrets are pulled from Secret Manager and exposed as env vars.
  # Vite replaces every import.meta.env.VITE_* reference at build time.
  # The resulting dist/ folder contains no runtime secret references —
  # the values are embedded in the minified JS bundle.
  - id: build
    name: node:22-alpine
    entrypoint: npm
    args: ['run', 'build']
    waitFor: ['lint']
    env:
      - 'VITE_API_URL=${_API_URL}'
    secretEnv:
      - VITE_FIREBASE_API_KEY
      - VITE_FIREBASE_AUTH_DOMAIN
      - VITE_FIREBASE_PROJECT_ID
      - VITE_FIREBASE_STORAGE_BUCKET
      - VITE_FIREBASE_MESSAGING_SENDER_ID
      - VITE_FIREBASE_APP_ID
      - VITE_GOOGLE_WEATHER_API_KEY

  # ── 4. Build Docker image and push to Artifact Registry ──────────────────────
  # The Dockerfile only copies dist/ into nginx:alpine — no Node.js at runtime.
  # Image size: ~50 MB.
  - id: build-and-push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: ['build']
    args:
      - -c
      - |
        set -e
        VERSION="$${TAG_NAME:-$${SHORT_SHA:-dev}}"
        IMAGE_BASE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE}"
        echo "Building $$IMAGE_BASE:$$VERSION"
        docker build \
          --build-arg APP_VERSION="$$VERSION" \
          --tag "$$IMAGE_BASE:$$VERSION" \
          --tag "$$IMAGE_BASE:latest" \
          --file=Dockerfile \
          .
        docker push "$$IMAGE_BASE:$$VERSION"
        docker push "$$IMAGE_BASE:latest"

  # ── 5. Deploy to Cloud Run ───────────────────────────────────────────────────
  # No VITE_* env vars are passed here — they are already baked into the bundle.
  # Cloud Run only needs to know which image to run.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    waitFor: ['build-and-push']
    args:
      - -c
      - |
        set -e
        VERSION="$${TAG_NAME:-$${SHORT_SHA:-dev}}"
        IMAGE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:$$VERSION"
        echo "Deploying $$IMAGE to Cloud Run service ${_SERVICE}"
        gcloud run deploy ${_SERVICE} \
          --image        "$$IMAGE" \
          --region       ${_REGION} \
          --platform     managed \
          --port         8080 \
          --allow-unauthenticated

timeout: 1200s
